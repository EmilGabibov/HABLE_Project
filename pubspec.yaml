name: hable
description: "Project Hable: A modular system comprising a Flutter Habit Tracker, Inverted Index Engine, and Spatial Routing System."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Local Database (Offline-First)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.6.0+eol

  # Background Sync & Connectivity
  connectivity_plus: ^7.2.0
  workmanager: ^0.9.0+3

  # Analytics & Charts
  fl_chart: ^1.2.0

  # Utilities
  uuid: ^4.5.1
  google_fonts: ^8.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  timezone: ^0.11.1
  share_plus: ^13.2.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.4
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage_platform_interface: ^2.0.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "Developement/Resources/app_icon.jpeg"
