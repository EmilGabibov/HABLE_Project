name: Bug report
description: Report a reproducible problem in Hable.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Please remove secrets and personal data before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "commit, platform, OS, browser, and app version"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include only sanitized logs and images.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
